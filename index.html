<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>YouSquared — Stats v2 (iOS Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --accent:#FF8370;
  --accent-dark:#E07A5F;
  --accent-surface:#FF8370;
  --primary-text:#2D2A26;
  --secondary-text:#6B6560;
  --tertiary-text:#9E9893;
  --bg:#FFFFFF;
  --bg-warm:#F5F2EF;
  --surface-light:#FBF9F7;
  --surface-dark:#F8F6F4;
  --surface-darken:#F0EDEA;
  --surface-black:#2D2A26;
  --border:#E8E4E0;
  --input-bg:#F5F2EF;
  --input-stroke:#D8D4D0;
  --error:#E53935;
  --success:#43A047;
  --warning:#F57C00;
  --warning-soft:#FFF4E6;
  --info:#42A5F5;
  --gold:#FFB300;
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{margin:0;padding:0;background:#1a1a1a;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#eee;min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}
.serif{font-family:'Lora',Georgia,serif}

/* Two-level navigator */
.nav-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;max-width:960px;width:100%}
.nav-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.nav-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-right:4px;align-self:center}
.nav-wrap button{font:inherit;font-size:13px;font-weight:500;padding:8px 14px;border-radius:30px;border:1px solid #333;background:#222;color:#ccc;cursor:pointer;transition:all .18s}
.nav-wrap button:hover{border-color:var(--accent);color:#fff}
.nav-wrap button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-wrap button.persona{font-size:14px;font-weight:600;padding:10px 18px}
.nav-wrap button.persona.active{background:linear-gradient(135deg,#FFB7A6,#FF8370);box-shadow:0 4px 14px rgba(255,131,112,.35)}
.label{font-size:12px;color:#888;text-align:center;max-width:640px;line-height:1.5;margin-bottom:14px}
.label a{color:#FFB7A6}

/* Phone frame */
.phone{
  width:393px;height:852px;
  background:var(--bg);
  border-radius:44px;
  border:10px solid #0a0a0a;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 10px 30px rgba(0,0,0,.4);
  position:relative;overflow:hidden;
  color:var(--primary-text);
}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:15px;font-weight:600;color:var(--primary-text);position:relative;z-index:5;flex-shrink:0}
.statusbar .notch{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:120px;height:34px;background:#0a0a0a;border-radius:20px}
.statusbar .icons{display:flex;gap:5px;align-items:center}
.statusbar .icons svg{display:block}

/* Screen */
.screen{position:absolute;inset:0;display:flex;flex-direction:column}
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 130px}
.body::-webkit-scrollbar{width:0}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 14px}
.h-title{font-size:28px;font-weight:600;color:var(--primary-text);font-family:'Lora',serif}
.share-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px 7px 11px;border-radius:30px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;box-shadow:0 2px 8px rgba(255,131,112,.25)}
.share-pill svg{display:block}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface-darken);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:var(--primary-text);flex-shrink:0}

/* Hero card */
.hero{
  margin:6px 16px 18px;
  background:linear-gradient(145deg,#2D2A26 0%,#433F3A 55%,#3A3632 100%);
  border-radius:22px;
  padding:22px 22px 20px;
  color:#fff;
  position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.35) 0%,rgba(255,131,112,0) 70%);top:-90px;right:-90px;pointer-events:none}
.hero::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.18) 0%,rgba(255,131,112,0) 70%);bottom:-70px;left:-50px;pointer-events:none}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#FFB7A6;position:relative}
.hero-num{font-family:'Lora',serif;font-size:46px;font-weight:600;line-height:1.05;margin:6px 0 4px;letter-spacing:-1px;position:relative}
.hero-sub{font-size:12px;color:#D8D2CB;position:relative;margin-bottom:12px;font-weight:500}
.cum-chart{position:relative;width:100%;height:56px;margin:6px 0 10px}
.hero-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;flex-wrap:wrap}
.hero-delta{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:30px;font-weight:600;font-size:11px;cursor:pointer;border:none;font-family:inherit}
.hero-delta.up{background:rgba(67,160,71,.2);color:#7BD789}
.hero-delta.down{background:rgba(245,124,0,.28);color:#FFB968}
.hero-delta-label{font-size:11px;color:#BFB8B0;font-weight:500}
.hero-cta-inline{font-size:12px;color:#FFB7A6;font-weight:600;cursor:pointer;border:none;background:none;font-family:inherit;display:inline-flex;align-items:center;gap:4px}

/* Activation stepper (cold start hero) */
.cold-stepper{position:relative;margin-top:12px}
.cold-step{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:0.5px solid rgba(255,255,255,.12);cursor:pointer}
.cold-step:last-child{border-bottom:0.5px solid rgba(255,255,255,.12)}
.cold-num{width:26px;height:26px;border-radius:50%;background:rgba(255,131,112,.22);border:1px solid rgba(255,131,112,.55);color:#FFB7A6;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Lora',serif}
.cold-step-label{flex:1;font-size:13px;color:#fff;font-weight:500}
.cold-step-chev{color:#B8B0A6;flex-shrink:0}

/* Section */
.section{margin:0 16px 18px}
.section-title{font-size:11px;font-weight:600;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.9px;margin:6px 4px 10px;display:flex;justify-content:space-between;align-items:center}
.section-title .more{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:0;text-transform:none;cursor:pointer}

.card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:18px;padding:18px}

/* 3-card KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi-card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:16px;padding:14px 12px 13px;cursor:pointer;position:relative;transition:transform .12s}
.kpi-card:hover{transform:translateY(-1px)}
.kpi-card.orange{background:var(--warning-soft);border-color:rgba(245,124,0,.35)}
.kpi-label{font-size:9px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.6px;font-weight:600;line-height:1.3;min-height:24px;margin-bottom:3px;display:flex;align-items:flex-start;gap:4px}
.kpi-card.orange .kpi-label{color:#8A4A0A}
.kpi-num{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);line-height:1.05;margin-bottom:3px;letter-spacing:-.3px}
.kpi-card.orange .kpi-num{color:var(--warning)}
.kpi-sub{font-size:10px;color:var(--tertiary-text);font-weight:500;line-height:1.3}
.kpi-card.orange .kpi-sub{color:#8A4A0A}
.kpi-dot{position:absolute;top:12px;right:12px;width:7px;height:7px;border-radius:50%;background:var(--warning);box-shadow:0 0 0 3px rgba(245,124,0,.18)}
.kpi-card.green-dot .kpi-dot{background:var(--success);box-shadow:0 0 0 3px rgba(67,160,71,.18)}

/* Highlight call cards (2-up) */
.highlight-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hl-card{background:linear-gradient(145deg,#2D2A26 0%,#3A3632 100%);border-radius:16px;padding:14px;color:#fff;position:relative;overflow:hidden;cursor:pointer;min-height:148px;display:flex;flex-direction:column;gap:8px}
.hl-card::before{content:"";position:absolute;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.3) 0%,rgba(255,131,112,0) 70%);top:-50px;right:-50px;pointer-events:none}
.hl-eyebrow{font-size:9px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:#FFB7A6;position:relative;display:flex;align-items:center;gap:5px}
.hl-name{font-size:13px;font-weight:600;color:#fff;position:relative;line-height:1.3}
.hl-summary{font-size:11px;color:#C4BDB5;position:relative;line-height:1.4;flex:1}
.hl-foot{display:flex;align-items:center;justify-content:space-between;position:relative;margin-top:auto}
.hl-duration{font-size:10px;color:#BFB8B0;display:flex;align-items:center;gap:4px;font-weight:500}
.hl-play{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff}

/* Empty highlight — cold start */
.hl-empty{background:var(--surface-dark);border:0.5px dashed var(--border);border-radius:16px;padding:18px;text-align:center;cursor:pointer}
.hl-empty-title{font-size:13px;font-weight:600;color:var(--primary-text);margin-bottom:4px}
.hl-empty-sub{font-size:12px;color:var(--secondary-text);line-height:1.4}

/* Milestone */
.milestone-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px}
.milestone-now{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);letter-spacing:-.3px}
.milestone-now .frac{font-size:13px;color:var(--secondary-text);font-weight:500;font-family:'Inter'}
.milestone-target{font-size:11px;color:var(--secondary-text);font-weight:500}
.milestone-bar{height:9px;background:var(--surface-darken);border-radius:30px;overflow:hidden;position:relative}
.milestone-fill{height:100%;background:linear-gradient(90deg,#FFB7A6 0%,var(--accent) 100%);border-radius:30px;position:relative}
.milestone-fill::after{content:"";position:absolute;right:0;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(255,131,112,.25)}
.milestone-tiers{display:flex;justify-content:space-between;margin-top:12px;gap:6px}
.tier{flex:1;text-align:center;font-size:9px;color:var(--tertiary-text);font-weight:500}
.tier .dot{width:7px;height:7px;border-radius:50%;background:var(--surface-darken);margin:0 auto 4px}
.tier.passed .dot{background:var(--accent)}
.tier.passed{color:var(--secondary-text)}
.tier.next .dot{background:var(--accent);box-shadow:0 0 0 3px rgba(255,131,112,.2)}

/* Banner — celebration/diagnosis */
.banner{margin:0 16px 16px;border-radius:18px;padding:13px 15px;display:flex;align-items:center;gap:11px;border:0.5px solid}
.banner.celebrate{background:linear-gradient(135deg,#FFE8E0 0%,#FFD4C4 100%);border-color:#FFC2AE}
.banner.warn{background:var(--warning-soft);border-color:rgba(245,124,0,.35)}
.banner-emoji{font-size:22px}
.banner-body{flex:1}
.banner-title{font-size:13px;font-weight:700;color:var(--primary-text);line-height:1.25}
.banner-sub{font-size:11px;color:var(--secondary-text);margin-top:2px}
.banner-cta{font-size:11px;font-weight:600;color:#fff;background:var(--accent);padding:7px 12px;border-radius:30px;border:none;font-family:inherit;cursor:pointer;white-space:nowrap}

/* Communication handled stacked bars */
.comm-grid{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px;padding:8px 0 0;position:relative}
.comm-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:6px;min-width:0;position:relative;z-index:1}
.comm-stack{width:100%;max-width:34px;display:flex;flex-direction:column-reverse;border-radius:4px 4px 2px 2px;overflow:hidden;min-height:6px;position:relative}
.comm-seg{width:100%}
.comm-seg.calls{background:linear-gradient(180deg,var(--accent),var(--accent-dark))}
.comm-seg.voicemails{background:linear-gradient(180deg,#FFB7A6,#FF9680)}
.comm-seg.texts{background:linear-gradient(180deg,#FFD4C4,#FFC0A8)}
.comm-col.past .comm-seg.calls{background:linear-gradient(180deg,rgba(255,131,112,.45),rgba(224,122,95,.5))}
.comm-col.past .comm-seg.voicemails{background:linear-gradient(180deg,rgba(255,183,166,.45),rgba(255,150,128,.5))}
.comm-col.past .comm-seg.texts{background:linear-gradient(180deg,rgba(255,212,196,.4),rgba(255,192,168,.45))}
.comm-label{font-size:9px;color:var(--tertiary-text);font-weight:500;text-align:center;line-height:1.2;white-space:nowrap}
.comm-val{font-size:11px;color:var(--secondary-text);font-weight:600}
.comm-legend{display:flex;gap:14px;font-size:10px;color:var(--secondary-text);margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.comm-leg{display:flex;align-items:center;gap:5px}
.comm-leg .dot{width:8px;height:8px;border-radius:2px}
.missed-line-label{display:flex;align-items:center;gap:5px}
.missed-line-label::before{content:"";width:12px;height:2px;background:var(--error);border-radius:1px}

/* Captured/Missed donut */
.split{display:flex;gap:12px;align-items:center}
.donut{position:relative;width:96px;height:96px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);line-height:1}
.donut-label{font-size:9px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.split-stats{flex:1;display:flex;flex-direction:column;gap:8px}
.split-stat{display:flex;align-items:center;gap:8px;font-size:12px}
.split-dot{width:10px;height:10px;border-radius:3px}
.split-stat .v{margin-left:auto;font-weight:600;color:var(--primary-text);font-family:'Lora',serif;font-size:14px}
.card-footnote{font-size:10px;color:var(--tertiary-text);margin-top:12px;padding-top:10px;border-top:0.5px solid var(--border);cursor:pointer}
.card-footnote a{color:var(--accent);font-weight:600;text-decoration:none}

/* Call row (fascination/leads — full summary visible) */
.call-row{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer}
.call-row.highlight-source{border-left:3px solid var(--accent)}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0}
.call-info{flex:1;min-width:0}
.call-name{font-size:14px;font-weight:600;color:var(--primary-text);display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.call-meta{font-size:11px;color:var(--tertiary-text);margin-bottom:5px}
.call-summary{font-size:12px;color:var(--secondary-text);line-height:1.45}
.call-value{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--accent-dark);flex-shrink:0;align-self:center}
.call-play{width:32px;height:32px;border-radius:50%;background:rgba(255,131,112,.12);display:flex;align-items:center;justify-content:center;color:var(--accent-dark);flex-shrink:0;align-self:center}
.lead-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.fascination-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;background:rgba(255,131,112,.14);color:var(--accent-dark);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* Diagnosis card (orange-mid) */
.diagnosis{background:var(--warning-soft);border:0.5px solid rgba(245,124,0,.35);border-radius:16px;padding:14px 16px}
.diagnosis-title{font-size:13px;font-weight:700;color:#8A4A0A;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.diagnosis-body{font-size:12px;color:#8A4A0A;line-height:1.5;margin-bottom:10px}
.diagnosis-cta{font-size:12px;font-weight:600;color:#fff;background:var(--warning);padding:8px 14px;border-radius:30px;border:none;font-family:inherit;cursor:pointer}

/* Satisfaction */
.sat-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;gap:2px;margin-bottom:14px;background:var(--surface-darken)}
.sat-seg{height:100%}
.sat-seg:first-child{border-radius:7px 0 0 7px}
.sat-seg:last-child{border-radius:0 7px 7px 0}
.sat-legend{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
.sat-item{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}
.sat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sat-name{flex:1;color:var(--secondary-text)}
.sat-val{font-weight:600;color:var(--primary-text);font-variant-numeric:tabular-nums}

/* Satisfaction drill-down */
.sat-cat{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:8px;cursor:pointer}
.sat-cat-head{display:flex;align-items:center;gap:10px}
.sat-cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sat-cat-name{flex:1;font-size:13px;font-weight:600;color:var(--primary-text)}
.sat-cat-val{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--primary-text);font-variant-numeric:tabular-nums}
.sat-cat-chev{color:var(--tertiary-text)}
.sat-reason{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:12px;margin-bottom:6px;margin-left:12px}
.sat-reason-label{flex:1;font-size:12px;color:var(--primary-text)}
.sat-reason-count{font-size:11px;color:var(--secondary-text);font-weight:600}
.sat-note{background:rgba(126,156,200,.1);border-left:3px solid #7E9CC8;padding:11px 13px;border-radius:0 10px 10px 0;font-size:11px;color:var(--secondary-text);line-height:1.5;margin-bottom:14px}
.sat-fix-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.sat-fix{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--warning-soft);border:0.5px solid rgba(245,124,0,.3);border-radius:12px;cursor:pointer}
.sat-fix-body{flex:1}
.sat-fix-title{font-size:12px;font-weight:600;color:#8A4A0A}
.sat-fix-sub{font-size:11px;color:#8A4A0A;margin-top:1px;opacity:.85}

/* Team */
.team-explain{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.team-explain-card{display:flex;gap:12px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px;padding:14px}
.team-explain-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,131,112,.12);display:flex;align-items:center;justify-content:center;color:var(--accent-dark);flex-shrink:0}
.team-explain-t{font-size:13px;font-weight:600;color:var(--primary-text);margin-bottom:3px}
.team-explain-b{font-size:11px;color:var(--secondary-text);line-height:1.5}
.team-primary{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:30px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(255,131,112,.3);display:flex;align-items:center;justify-content:center;gap:8px}
.team-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px;margin-bottom:8px}
.team-info{flex:1;min-width:0}
.team-name{font-size:14px;font-weight:600;color:var(--primary-text)}
.team-meta{font-size:11px;color:var(--secondary-text);margin-top:2px}
.team-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.team-status.invited{background:rgba(150,150,150,.15);color:var(--secondary-text)}
.team-status.account{background:rgba(66,165,245,.14);color:#1E6BB8}
.team-status.subscribed{background:rgba(67,160,71,.14);color:#2C7A2F}

/* Utility: make a cumulative series for the hero curve */
function makeCumSeries(final, count, shape){
  const pts=[];
  for(let i=0;i<count;i++){
    const t = i/(count-1);
    let v;
    if(shape==="up"){ v = final * Math.pow(t,1.6); }
    else if(shape==="slowing"){
      // steep early, flatten near the end
      const ease = 1 - Math.pow(1-t,1.8);
      const flat = i>=count-3 ? 0.97 : 1;
      v = final * ease * flat;
    } else { v = final * t; }
    pts.push(Math.round(v));
  }
  return pts;
}

  const w=340, h=56, pad=2;
  const max = Math.max(...series,1);
  const sx = i => pad + (i/(series.length-1))*(w-pad*2);
  const sy = v => h - pad - (v/max)*(h-pad*2);
  const path = series.map((v,i)=>`${i===0?"M":"L"}${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(" ");
  const area = path + ` L${sx(series.length-1).toFixed(1)},${h} L${sx(0).toFixed(1)},${h} Z`;
  const stroke = orange ? "#FFB968" : "#FFB7A6";
  return (
    <svg className="cum-chart" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="cg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor={stroke} stopOpacity=".55"/>
          <stop offset="1" stopColor={stroke} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#cg)"/>
      <path d={path} fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

/* Donut for captured vs missed */
const Donut = ({pct=84}) => {
  const r=38, c=2*Math.PI*r;
  const dash = (pct/100)*c;
  return (
    <div className="donut">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="48" cy="48" r={r} fill="none" stroke="#F0EDEA" strokeWidth="10"/>
        <circle cx="48" cy="48" r={r} fill="none" stroke="url(#dg)" strokeWidth="10" strokeDasharray={`${dash} ${c}`} strokeLinecap="round" transform="rotate(-90 48 48)"/>
        <defs>
          <linearGradient id="dg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stopColor="#FF8370"/>
            <stop offset="1" stopColor="#E07A5F"/>
          </linearGradient>
        </defs>
      </svg>
      <div className="donut-center">
        <div className="donut-pct">{pct}%</div>
        <div className="donut-label">Captured</div>
      </div>
    </div>
  );
};

/* Communication stacked bars + missed overlay line */
const CommChart = ({cycles}) => {
  if(!cycles) return null;
  const max = Math.max(...cycles.map(c=>c.calls+c.voicemails+c.texts));
  const maxMissed = Math.max(...cycles.map(c=>c.missed),1);
  // Render bars as absolute DOM; overlay missed as SVG polyline.
  const w=340, h=150, padY=8;
  const cx = i => 18 + (i/(cycles.length-1))*(w-36);
  const cy = m => h - padY - (m/max)*(h-padY*2);
  const missedPath = cycles.map((c,i)=>`${i===0?"M":"L"}${cx(i).toFixed(1)},${cy(c.missed).toFixed(1)}`).join(" ");
  return (
    <div>
      <div className="comm-grid" style={{position:"relative"}}>
        {cycles.map((c,i)=>{
          const total = c.calls+c.voicemails+c.texts;
          const stackH = (total/max)*100;
          return (
            <div className={"comm-col"+(c.past?" past":"")} key={i}>
              <div className="comm-val">{total}</div>
              <div className="comm-stack" style={{height:`${stackH}%`}}>
                {c.calls>0 && <div className="comm-seg calls" style={{flex:c.calls}}></div>}
                {c.voicemails>0 && <div className="comm-seg voicemails" style={{flex:c.voicemails}}></div>}
                {c.texts>0 && <div className="comm-seg texts" style={{flex:c.texts}}></div>}
              </div>
              <div className="comm-label">{c.label}</div>
            </div>
          );
        })}
        <svg style={{position:"absolute",inset:"8px 0 28px 0",pointerEvents:"none",width:"100%",height:"calc(100% - 36px)"}} viewBox={`0 0 ${w} ${h-padY*2}`} preserveAspectRatio="none">
          <path d={missedPath.replace(/cy\((\d+)\)/g,(m,p)=>(parseFloat(p)-padY).toFixed(1))} fill="none" stroke="#E53935" strokeWidth="1.5" strokeDasharray="3 3" opacity=".7"/>
        </svg>
      </div>
      <div className="comm-legend">
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FF8370,#E07A5F)"}}></span>Calls</div>
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FFB7A6,#FF9680)"}}></span>Voicemails</div>
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FFD4C4,#FFC0A8)"}}></span>Texts</div>
        <div className="comm-leg missed-line-label">missed</div>
      </div>
    </div>
  );
};

/* ============================================================
 *  APP SHELL — two-level navigator
 * ============================================================ */
const PERSONA_VIEWS = {
  mature_accelerating: [
    {id:"stats",label:"Stats"},
    {id:"satisfaction",label:"Satisfaction"},
    {id:"team",label:"Team"},
    {id:"channels",label:"Channels"},
    {id:"player-fascination",label:"Fascination player"},
    {id:"player-lead",label:"Lead player"},
    {id:"inbox",label:"Inbox"},
    {id:"lock",label:"Lock screen"},
  ],
  orange_mid: [
    {id:"stats",label:"Stats"},
    {id:"satisfaction",label:"Satisfaction (Unhappy)"},
    {id:"team",label:"Team"},
    {id:"channels",label:"Channels"},
    {id:"player-fascination",label:"Fascination player"},
    {id:"inbox",label:"Inbox"},
    {id:"lock",label:"Lock screen"},
  ],
  solo_cold_start: [
    {id:"stats",label:"Stats"},
    {id:"team",label:"Team (invite)"},
    {id:"channels",label:"Channels (inactive)"},
  ],
};

function App(){
  const [persona,setPersona] = useState("mature_accelerating");
  const [view,setView] = useState("stats");

  const onChangePersona = (id) => {
    setPersona(id);
    setView("stats");
  };

  const goBack = () => setView("stats");
  const onNav = (destination) => {
    // Map stats-screen taps to sub-views
    const map = {
      channels:"channels",team:"team",satisfaction:"satisfaction",
      "player-fascination":"player-fascination","player-lead":"player-lead",
      share:"lock",diagnose:"stats", // diagnose scrolls on same page
    };
    const target = map[destination] || destination;
    if(target==="stats"){
      // scroll to diagnosis — naive: leave on stats
      return;
    }
    setView(target);
  };

  const render = () => {
    switch(view){
      case "stats":              return <StatsScreen persona={persona} onNav={onNav}/>;
      case "satisfaction":       return <SatisfactionScreen persona={persona} onBack={goBack}/>;
      case "team":               return <TeamScreen persona={persona} onBack={goBack}/>;
      case "channels":           return <ChannelsScreen persona={persona} onBack={goBack}/>;
      case "player-fascination": return <PlayerScreen persona={persona} type="fascination" onBack={goBack}/>;
      case "player-lead":        return <PlayerScreen persona={persona} type="lead" onBack={goBack}/>;
      case "inbox":              return <InboxScreen persona={persona} onBack={goBack}/>;
      case "lock":               return <LockScreen persona={persona} onBack={goBack}/>;
      default:                   return <StatsScreen persona={persona} onNav={onNav}/>;
    }
  };

  const availableViews = PERSONA_VIEWS[persona];

  return (
    <>
      <div className="nav-wrap">
        <div className="nav-row">
          <span className="nav-label">Persona</span>
          {Object.entries(PERSONAS).map(([id,p])=>(
            <button key={id} className={"persona"+(persona===id?" active":"")} onClick={()=>onChangePersona(id)}>{p.shortLabel}</button>
          ))}
        </div>
        <div className="nav-row">
          <span className="nav-label">View</span>
          {availableViews.map(v=>(
            <button key={v.id} className={view===v.id?"active":""} onClick={()=>setView(v.id)}>{v.label}</button>
          ))}
        </div>
      </div>
      <div className="label">YouSquared iOS — Stats tab v2 · 3 personas × per-persona drill-downs · <a href="SPEC.md">Spec for Joris + AdB →</a></div>
      <div className="phone">{render()}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
