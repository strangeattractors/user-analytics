<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>YouSquared — Stats v2 (iOS Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --accent:#FF8370;
  --accent-dark:#E07A5F;
  --primary-text:#2D2A26;
  --secondary-text:#6B6560;
  --tertiary-text:#9E9893;
  --bg:#FFFFFF;
  --bg-warm:#F5F2EF;
  --surface-light:#FBF9F7;
  --surface-dark:#F8F6F4;
  --surface-darken:#F0EDEA;
  --surface-black:#2D2A26;
  --border:#E8E4E0;
  --error:#E53935;
  --success:#43A047;
  --warning:#F57C00;
  --warning-soft:#FFF4E6;
  --info:#42A5F5;
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{margin:0;padding:0;background:#1a1a1a;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#eee;min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}
.serif{font-family:'Lora',Georgia,serif}

/* Persona navigator — single row */
.nav-row{display:flex;gap:10px;margin-bottom:22px;justify-content:center;flex-wrap:wrap}
.nav-row button{font:inherit;font-size:14px;font-weight:600;padding:10px 18px;border-radius:30px;border:1px solid #333;background:#222;color:#ccc;cursor:pointer;transition:all .2s}
.nav-row button:hover{border-color:var(--accent);color:#fff}
.nav-row button.active{background:linear-gradient(135deg,#FFB7A6,#FF8370);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(255,131,112,.35)}

/* Phone frame */
.phone{
  width:393px;height:852px;
  background:var(--bg);
  border-radius:44px;
  border:10px solid #0a0a0a;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 10px 30px rgba(0,0,0,.4);
  position:relative;overflow:hidden;
  color:var(--primary-text);
}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:15px;font-weight:600;color:var(--primary-text);position:relative;z-index:5;flex-shrink:0}
.statusbar .notch{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:120px;height:34px;background:#0a0a0a;border-radius:20px}
.statusbar .icons{display:flex;gap:5px;align-items:center}
.statusbar .icons svg{display:block}

/* Screen layout */
.screen{position:absolute;inset:0;display:flex;flex-direction:column}
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 130px;scroll-behavior:smooth}
.body::-webkit-scrollbar{width:0}

/* Header: title + 1-liner subtitle */
.page-head{padding:8px 20px 8px}
.page-title{font-size:26px;font-weight:600;color:var(--primary-text);font-family:'Lora',serif;letter-spacing:-.3px;line-height:1.15}
.page-sub{font-size:13px;color:var(--secondary-text);margin-top:4px;line-height:1.4;font-weight:500}

/* Section */
.section{margin:16px 16px}
.section-title{font-size:11px;font-weight:600;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.9px;margin:0 4px 10px;display:flex;justify-content:space-between;align-items:center}
.section-title .more{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:0;text-transform:none;cursor:pointer}
.card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:18px;padding:18px}

/* ============================================================
 *  HERO CARD — the only dark gradient on the page
 * ============================================================ */
.hero-wrap{margin:6px 16px 20px;position:relative}
.hero{
  background:linear-gradient(145deg,#2D2A26 0%,#433F3A 55%,#3A3632 100%);
  border-radius:22px;
  padding:20px 22px 18px;
  color:#fff;
  position:relative;overflow:hidden;
  cursor:pointer;
}
.hero::before{content:"";position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.35) 0%,rgba(255,131,112,0) 70%);top:-90px;right:-90px;pointer-events:none}
.hero::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.18) 0%,rgba(255,131,112,0) 70%);bottom:-70px;left:-50px;pointer-events:none}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;gap:12px}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#FFB7A6}
.hero-share{display:inline-flex;align-items:center;gap:5px;padding:6px 11px 6px 9px;border-radius:30px;background:rgba(255,255,255,.12);border:0.5px solid rgba(255,255,255,.22);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;backdrop-filter:blur(4px)}
.hero-num{font-family:'Lora',serif;font-size:46px;font-weight:600;line-height:1.05;margin:4px 0 4px;letter-spacing:-1px;position:relative}
.hero-sub{font-size:12px;color:#D8D2CB;position:relative;margin-bottom:10px;font-weight:500}
.cum-chart{position:relative;width:100%;height:56px;margin:4px 0 10px;display:block}
.hero-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;flex-wrap:wrap}
.hero-delta{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:30px;font-weight:600;font-size:11px;font-family:inherit;border:none}
.hero-delta.up{background:rgba(67,160,71,.22);color:#7BD789}
.hero-delta.down{background:rgba(245,124,0,.3);color:#FFB968}
.hero-tap{font-size:11px;color:#FFB7A6;font-weight:600;display:inline-flex;align-items:center;gap:3px}

/* Activation stepper (cold start hero internals) */
.cold-stepper{position:relative;margin-top:10px}
.cold-title{font-family:'Lora',serif;font-size:22px;line-height:1.25;font-weight:600;margin:8px 0 10px;position:relative;color:#fff;letter-spacing:-.3px}
.cold-step{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:0.5px solid rgba(255,255,255,.14)}
.cold-step:last-child{border-bottom:0.5px solid rgba(255,255,255,.14)}
.cold-num{width:26px;height:26px;border-radius:50%;background:rgba(255,131,112,.22);border:1px solid rgba(255,131,112,.55);color:#FFB7A6;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Lora',serif}
.cold-step-label{flex:1;font-size:13px;color:#fff;font-weight:500}
.cold-step-chev{color:#B8B0A6;flex-shrink:0}

/* ============================================================
 *  KPI CARDS — with icons, scroll-to on tap
 * ============================================================ */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi-card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:16px;padding:13px 12px 12px;cursor:pointer;position:relative;transition:transform .12s}
.kpi-card:hover{transform:translateY(-1px)}
.kpi-card.orange{background:var(--warning-soft);border-color:rgba(245,124,0,.35)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.kpi-icon{width:24px;height:24px;border-radius:7px;background:rgba(255,131,112,.14);color:var(--accent-dark);display:flex;align-items:center;justify-content:center}
.kpi-card.orange .kpi-icon{background:rgba(245,124,0,.18);color:var(--warning)}
.kpi-dot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 0 3px rgba(67,160,71,.18)}
.kpi-card.orange .kpi-dot{background:var(--warning);box-shadow:0 0 0 3px rgba(245,124,0,.2)}
.kpi-label{font-size:9px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin:4px 0 2px}
.kpi-card.orange .kpi-label{color:#8A4A0A}
.kpi-num{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);line-height:1.05;margin-bottom:2px;letter-spacing:-.3px}
.kpi-card.orange .kpi-num{color:var(--warning)}
.kpi-sub{font-size:10px;color:var(--tertiary-text);font-weight:500;line-height:1.3}
.kpi-card.orange .kpi-sub{color:#8A4A0A}

/* ============================================================
 *  HIGHLIGHT (Delight / Lead) — light bg, waveform, triangle play
 * ============================================================ */
.hl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hl-card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;display:flex;flex-direction:column;gap:8px;min-height:150px;transition:transform .12s}
.hl-card:hover{transform:translateY(-1px)}
.hl-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.hl-eye{font-size:9px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:var(--accent-dark);display:flex;align-items:center;gap:4px}
.hl-name{font-size:13px;font-weight:600;color:var(--primary-text);line-height:1.25}
.hl-sum{font-size:11px;color:var(--secondary-text);line-height:1.4;flex:1}
.hl-foot{display:flex;align-items:center;gap:10px;margin-top:auto}
.hl-play{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 2px 8px rgba(255,131,112,.35)}
.hl-play svg{margin-left:2px}
.wave{flex:1;display:flex;align-items:center;gap:1.5px;height:22px}
.wave .bar{width:2px;background:var(--accent);border-radius:1px;opacity:.55}
.wave .bar.played{opacity:1}
.hl-meta{font-size:10px;color:var(--tertiary-text);font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}

/* Empty highlight (cold start) */
.hl-empty{background:var(--surface-dark);border:0.5px dashed var(--border);border-radius:16px;padding:20px;text-align:center;cursor:pointer}
.hl-empty-title{font-size:13px;font-weight:600;color:var(--primary-text);margin-bottom:4px}
.hl-empty-sub{font-size:12px;color:var(--secondary-text);line-height:1.4}

/* ============================================================
 *  DIAGNOSIS banner (orange-mid only, sits where you scroll to)
 * ============================================================ */
.diagnosis{background:var(--warning-soft);border:0.5px solid rgba(245,124,0,.35);border-radius:16px;padding:14px 16px}
.diagnosis-title{font-size:13px;font-weight:700;color:#8A4A0A;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.diagnosis-body{font-size:12px;color:#8A4A0A;line-height:1.5;margin-bottom:10px}
.diagnosis-cta{font-size:12px;font-weight:600;color:#fff;background:var(--warning);padding:8px 14px;border-radius:30px;border:none;font-family:inherit;cursor:pointer}

/* ============================================================
 *  COMMUNICATION stacked bars + missed dashed line
 * ============================================================ */
.comm-grid{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px;padding:8px 0 0;position:relative}
.comm-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:6px;min-width:0;position:relative;z-index:1}
.comm-stack{width:100%;max-width:34px;display:flex;flex-direction:column-reverse;border-radius:4px 4px 2px 2px;overflow:hidden;min-height:6px;position:relative}
.comm-seg{width:100%}
.comm-seg.calls{background:linear-gradient(180deg,var(--accent),var(--accent-dark))}
.comm-seg.voicemails{background:linear-gradient(180deg,#FFB7A6,#FF9680)}
.comm-seg.texts{background:linear-gradient(180deg,#FFD4C4,#FFC0A8)}
.comm-col.past .comm-seg.calls{background:linear-gradient(180deg,rgba(255,131,112,.45),rgba(224,122,95,.5))}
.comm-col.past .comm-seg.voicemails{background:linear-gradient(180deg,rgba(255,183,166,.45),rgba(255,150,128,.5))}
.comm-col.past .comm-seg.texts{background:linear-gradient(180deg,rgba(255,212,196,.4),rgba(255,192,168,.45))}
.comm-label{font-size:9px;color:var(--tertiary-text);font-weight:500;text-align:center;white-space:nowrap}
.comm-val{font-size:11px;color:var(--secondary-text);font-weight:600}
.comm-legend{display:flex;gap:13px;font-size:10px;color:var(--secondary-text);margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.comm-leg{display:flex;align-items:center;gap:5px}
.comm-leg .dot{width:8px;height:8px;border-radius:2px}
.missed-line-label{display:flex;align-items:center;gap:5px}
.missed-line-label::before{content:"";width:12px;height:0;border-top:1.5px dashed #E53935;border-radius:1px}

/* ============================================================
 *  Donut (captured vs missed)
 * ============================================================ */
.split{display:flex;gap:12px;align-items:center}
.donut{position:relative;width:96px;height:96px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);line-height:1}
.donut-label{font-size:9px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.split-stats{flex:1;display:flex;flex-direction:column;gap:8px}
.split-stat{display:flex;align-items:center;gap:8px;font-size:12px}
.split-dot{width:10px;height:10px;border-radius:3px}
.split-stat .v{margin-left:auto;font-weight:600;color:var(--primary-text);font-family:'Lora',serif;font-size:14px}

/* ============================================================
 *  Satisfaction — distribution + expandable categories
 * ============================================================ */
.sat-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;gap:2px;margin-bottom:14px;background:var(--surface-darken)}
.sat-seg{height:100%}
.sat-seg:first-child{border-radius:7px 0 0 7px}
.sat-seg:last-child{border-radius:0 7px 7px 0}
.sat-cat{padding:11px 0;border-top:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.sat-cat:last-of-type{border-bottom:0.5px solid var(--border)}
.sat-cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sat-cat-name{flex:1;font-size:13px;font-weight:600;color:var(--primary-text)}
.sat-cat-val{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--primary-text);font-variant-numeric:tabular-nums}
.sat-cat-chev{color:var(--tertiary-text);transition:transform .2s;flex-shrink:0}
.sat-cat-chev.open{transform:rotate(90deg)}
.sat-reason{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg-warm);border-radius:10px;margin:6px 0 6px 20px}
.sat-reason-label{flex:1;font-size:12px;color:var(--primary-text)}
.sat-reason-count{font-size:10px;color:var(--secondary-text);font-weight:600}
.sat-note{background:rgba(126,156,200,.1);border-left:3px solid #7E9CC8;padding:10px 12px;border-radius:0 10px 10px 0;font-size:11px;color:var(--secondary-text);line-height:1.5;margin-bottom:14px}
.sat-fix{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--warning-soft);border:0.5px solid rgba(245,124,0,.3);border-radius:12px;margin-bottom:8px;cursor:pointer}
.sat-fix-body{flex:1}
.sat-fix-title{font-size:12px;font-weight:600;color:#8A4A0A}
.sat-fix-sub{font-size:11px;color:#8A4A0A;margin-top:1px;opacity:.85}

/* ============================================================
 *  Team rows
 * ============================================================ */
.team-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:0.5px solid var(--border)}
.team-row:last-of-type{border-bottom:0.5px solid var(--border)}
.team-info{flex:1;min-width:0}
.team-name{font-size:14px;font-weight:600;color:var(--primary-text)}
.team-meta{font-size:11px;color:var(--secondary-text);margin-top:2px}
.team-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px}
.team-status.invited{background:rgba(150,150,150,.15);color:var(--secondary-text)}
.team-status.account{background:rgba(66,165,245,.14);color:#1E6BB8}
.team-status.subscribed{background:rgba(67,160,71,.14);color:#2C7A2F}
.team-status.contributed{background:rgba(255,131,112,.14);color:var(--accent-dark)}
.team-action{font-size:11px;font-weight:600;color:var(--accent-dark);background:rgba(255,131,112,.12);border:none;padding:7px 11px;border-radius:30px;cursor:pointer;font-family:inherit;white-space:nowrap}
.team-empty{text-align:center;padding:6px 0 12px}
.team-cta-primary{margin-top:14px;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:30px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(255,131,112,.3);display:flex;align-items:center;justify-content:center;gap:6px}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0}

/* ============================================================
 *  Channels rows
 * ============================================================ */
.ch-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:0.5px solid var(--border);cursor:pointer}
.ch-row:last-of-type{border-bottom:0.5px solid var(--border)}
.ch-row.coming{opacity:.55}
.ch-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,131,112,.12);color:var(--accent-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-row.orange .ch-icon{background:rgba(245,124,0,.16);color:var(--warning)}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:600;color:var(--primary-text)}
.ch-body{font-size:11px;color:var(--secondary-text);margin-top:2px;line-height:1.4}
.ch-body strong{color:var(--primary-text);font-weight:600}
.ch-row.orange .ch-body strong{color:#8A4A0A}
.ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ch-dot.active{background:var(--success)}
.ch-dot.orange{background:var(--warning)}
.ch-dot.off{background:var(--tertiary-text)}

/* ============================================================
 *  Call rows (Delight / Leads with full summaries)
 * ============================================================ */
.call-row{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer}
.call-info{flex:1;min-width:0}
.call-name{font-size:14px;font-weight:600;color:var(--primary-text);display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.call-meta{font-size:11px;color:var(--tertiary-text);margin-bottom:5px}
.call-summary{font-size:12px;color:var(--secondary-text);line-height:1.45}
.call-value{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--accent-dark);flex-shrink:0;align-self:center}
.call-play{width:30px;height:30px;border-radius:50%;background:rgba(255,131,112,.12);display:flex;align-items:center;justify-content:center;color:var(--accent-dark);flex-shrink:0;align-self:center}
.call-play svg{margin-left:2px}
.lead-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.delight-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;background:rgba(255,131,112,.14);color:var(--accent-dark);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* Floating tab bar */
.tabbar-wrap{position:absolute;left:0;right:0;bottom:14px;display:flex;justify-content:center;align-items:center;padding:0 16px;gap:14px;z-index:10}
.tabbar{display:flex;align-items:center;height:56px;background:var(--surface-darken);border-radius:30px;padding:0 4px;flex:1;max-width:268px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.tab{flex:0 0 auto;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:30px;color:var(--primary-text)}
.tab.selected{background:var(--surface-black);color:#fff;padding:0 16px 0 14px;width:auto;gap:8px;height:48px}
.tab.selected .tab-label{font-size:14px;font-weight:600}
.assistant{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FFB7A6,#FF8370 60%,#E07A5F);box-shadow:0 6px 20px rgba(255,131,112,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'Lora',serif;font-size:22px;flex-shrink:0}

</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const {useState,useRef} = React;
const COLOR_ORANGE="#F57C00", COLOR_ACCENT="#FF8370";

/* ============================================================
 *  PERSONA DATA
 * ============================================================ */
const PERSONAS = {
  mature_accelerating: {
    label:"Mature accelerating",
    headline:"You're on fire",
    subhead:"Up 34% this month — tell your boss about it",
    hero:{
      kind:"number",
      value:"$342,180",
      durationLabel:"Last 2 years 3 months",
      delta:{dir:"up",pct:34},
      series: makeCumSeries(27,"up"),
    },

function makeCumSeries(count, shape){
  const final = 100;
  const pts=[];
  for(let i=0;i<count;i++){
    const t = i/(count-1);
    let v;
    if(shape==="up"){ v = final * Math.pow(t,1.6); }
    else if(shape==="slowing"){
      const ease = 1 - Math.pow(1-t,1.8);
      const flat = i>=count-3 ? 0.97 : 1;
      v = final * ease * flat;
    } else { v = final * t; }
    pts.push(v);
  }
  return pts;
}

/* Cumulative area chart inside hero */
const CumChart = ({series, down=false}) => {
  if(!series || !series.length) return null;
  const w=340, h=56, pad=2;
  const max = Math.max(...series,1);
  const sx = i => pad + (i/(series.length-1))*(w-pad*2);
  const sy = v => h - pad - (v/max)*(h-pad*2);
  const path = series.map((v,i)=>`${i===0?"M":"L"}${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(" ");
  const area = path + ` L${sx(series.length-1).toFixed(1)},${h} L${sx(0).toFixed(1)},${h} Z`;
  const stroke = down ? "#FFB968" : "#FFB7A6";
  return (
    <svg className="cum-chart" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="cg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor={stroke} stopOpacity=".55"/>
          <stop offset="1" stopColor={stroke} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#cg)"/>
      <path d={path} fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

/* Stacked comm chart with missed line overlay */
const CommChart = ({cycles}) => {
  if(!cycles) return null;
  const max = Math.max(...cycles.map(c=>c.calls+c.voicemails+c.texts));
  const w=340, h=134;
  const cx = i => 20 + (i/(cycles.length-1))*(w-40);
  const cy = m => h - (m/max)*h;
  const missedPath = cycles.map((c,i)=>`${i===0?"M":"L"}${cx(i).toFixed(1)},${cy(c.missed).toFixed(1)}`).join(" ");
  return (
    <div>
      <div className="comm-grid">
        {cycles.map((c,i)=>{
          const total = c.calls+c.voicemails+c.texts;
          const stackH = (total/max)*100;
          return (
            <div className={"comm-col"+(c.past?" past":"")} key={i}>
              <div className="comm-val">{total}</div>
              <div className="comm-stack" style={{height:`${stackH}%`}}>
                {c.calls>0 && <div className="comm-seg calls" style={{flex:c.calls}}></div>}
                {c.voicemails>0 && <div className="comm-seg voicemails" style={{flex:c.voicemails}}></div>}
                {c.texts>0 && <div className="comm-seg texts" style={{flex:c.texts}}></div>}
              </div>
              <div className="comm-label">{c.label}</div>
            </div>
          );
        })}
        <svg style={{position:"absolute",left:0,right:0,top:22,height:134,width:"100%",pointerEvents:"none"}} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
          <path d={missedPath} fill="none" stroke="#E53935" strokeWidth="1.6" strokeDasharray="3 3" opacity=".7"/>
        </svg>
      </div>
      <div className="comm-legend">
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FF8370,#E07A5F)"}}></span>Calls</div>
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FFB7A6,#FF9680)"}}></span>Voicemails</div>
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FFD4C4,#FFC0A8)"}}></span>Texts</div>
        <div className="comm-leg missed-line-label">missed</div>
      </div>
    </div>
  );
};

                Share this
              </button>
            </div>
            {isCold ? (
              <>
                <div className="cold-title">{p.hero.title}</div>
                <div className="cold-stepper">
                  {p.hero.steps.map((s,i)=>(
                    <div className="cold-step" key={i}>
                      <div className="cold-num">{i+1}</div>
                      <div className="cold-step-label">{s}</div>
                      <svg className="cold-step-chev" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <>
                <div className="hero-num serif">{p.hero.value}</div>
                <div className="hero-sub">{p.hero.durationLabel}</div>
                <CumChart series={p.hero.series} down={isDown}/>
                <div className="hero-bottom">
                  <div className={"hero-delta "+(isUp?"up":"down")}>
                    {isUp?"↑":"↓"} {p.hero.delta.pct}%
                    <span style={{fontWeight:400,opacity:.8,marginLeft:2}}>vs prev 30d</span>
                  </div>
                  <span className="hero-tap">Tap to see why →</span>
                </div>
              </>
            )}
          </div>
        </div>

        {/* 3 KPI CARDS with icons, scroll to section */}
        <div className="section" style={{margin:"0 16px 16px"}}>
          <div className="kpi-grid">
            <KPICard kpi={p.kpis.channels} label="Channels" icon={<IconPhone/>} onTap={()=>scrollTo("channels")}/>
            <KPICard kpi={p.kpis.seats}    label="Seats"    icon={<IconPeople/>} onTap={()=>scrollTo("team")}/>
            <KPICard kpi={p.kpis.satisfaction} label="Satisfaction" icon={<IconSmile/>} onTap={()=>scrollTo("satisfaction")}/>
          </div>
        </div>

        {/* HIGHLIGHTS — waveform style, light bg */}
        <div className="section" style={{margin:"0 16px 18px"}}>
          {p.highlights ? (
            <div className="hl-row">
              <HighlightCard type="delight" call={p.highlights.delight} onTap={()=>scrollTo("delight")}/>
              <HighlightCard type="lead"    call={p.highlights.lead}    onTap={()=>scrollTo("leads")}/>
            </div>
          ) : p.coldActivation ? (
            <div className="hl-empty">
              <div className="hl-empty-title">{p.coldActivation.title}</div>
              <div className="hl-empty-sub">{p.coldActivation.sub}</div>
            </div>
          ) : null}
        </div>

        {/* DIAGNOSIS (orange-mid) */}
        {p.diagnosis && (
          <div className="section" ref={refs.diagnosis}>
            <div className="section-title">Diagnosis</div>
            <div className="diagnosis">
              <div className="diagnosis-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                {p.diagnosis.title}
              </div>
              <div className="diagnosis-body" dangerouslySetInnerHTML={{__html:p.diagnosis.body}}></div>
              <button className="diagnosis-cta">{p.diagnosis.ctaLabel}</button>
            </div>
          </div>
        )}

        {/* COMMUNICATION */}
        <div className="section" ref={refs.comm}>
          <div className="section-title">Communication handled by your AI <span className="more">Last 6 cycles</span></div>
          {p.comm.problem && (
            <div className="diagnosis" style={{marginBottom:10}}>
              <div className="diagnosis-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                {p.comm.problem.text}
              </div>
            </div>
          )}
          <div className="card">
            {p.comm.cycles ? <CommChart cycles={p.comm.cycles}/> : (
              <div style={{padding:"36px 10px",textAlign:"center",fontSize:12,color:"var(--tertiary-text)"}}>{p.comm.empty}</div>
            )}
          </div>
        </div>

        {/* CAPTURED vs MISSED */}
        {p.captured && (
          <div className="section" ref={refs.captured}>
            <div className="section-title">Captured vs missed</div>
            <div className="card split">
              <Donut pct={p.captured.pct}/>
              <div className="split-stats">
                <div className="split-stat"><span className="split-dot" style={{background:"var(--accent)"}}></span><span>Captured</span><span className="v">{p.captured.captured}</span></div>
                <div className="split-stat"><span className="split-dot" style={{background:"#F0EDEA"}}></span><span>Missed</span><span className="v">{p.captured.missed}</span></div>
                <div className="split-stat" style={{borderTop:"0.5px solid var(--border)",paddingTop:8,marginTop:2}}><span style={{fontSize:11,color:"var(--secondary-text)"}}>Recovered</span><span className="v" style={{color:"var(--accent-dark)"}}>{p.captured.recovered}</span></div>
              </div>
            </div>
          </div>
        )}

        {/* SATISFACTION (incl. expand) */}
        {p.satisfaction && (
          <div className="section" ref={refs.satisfaction}>
            <div className="section-title">Satisfaction</div>
            <div className="card">
              <div className="sat-bar">
                {p.satisfaction.segments.map((s,i)=>(<div key={i} className="sat-seg" style={{width:`${s.pct}%`,background:s.color}}></div>))}
              </div>
              <div className="sat-note"><strong>Weighted by VIP contacts</strong> and their all-time lead value. One unhappy VIP weighs more than 10 happy one-offs.</div>
              {p.satisfaction.orangeReasons && p.satisfaction.orangeReasons.length>0 && p.satisfaction.orangeReasons.map((r,i)=>(
                <div className="sat-fix" key={i}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{color:COLOR_ORANGE,flexShrink:0}}><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  <div className="sat-fix-body"><div className="sat-fix-title">{r.title}</div><div className="sat-fix-sub">{r.sub}</div></div>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{color:"#8A4A0A",flexShrink:0}}><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
              ))}
              {p.satisfaction.segments.map((s,i)=>(
                <div key={i}>
                  <div className="sat-cat" onClick={()=>{ if(s.label==="Unhappy") setUnhappyOpen(!unhappyOpen); }}>
                    <div className="sat-cat-dot" style={{background:s.color}}></div>
                    <div className="sat-cat-name">{s.label}</div>
                    <div className="sat-cat-val">{s.v}</div>
                    {s.label==="Unhappy" && (
                      <svg className={"sat-cat-chev"+(unhappyOpen?" open":"")} width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    )}
                  </div>
                  {s.label==="Unhappy" && unhappyOpen && p.satisfaction.unhappyReasons && p.satisfaction.unhappyReasons.map((r,j)=>(
                    <div className="sat-reason" key={j}>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style={{color:"#E53935"}}><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2"/><path d="M15 9l-6 6M9 9l6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                      <span className="sat-reason-label">{r.label}</span>
                      <span className="sat-reason-count">{r.count} call{r.count!==1?"s":""}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* TEAM */}
        <div className="section" ref={refs.team}>
          <div className="section-title">Team</div>
          <div className="card" style={{padding:"2px 16px 16px"}}>
            {p.team.kind==="list" ? (
              <>
                {p.team.members.map((m,i)=>(
                  <div className="team-row" key={i}>
                    <div className="avatar" style={{background:m.color}}>{m.avatar}</div>
                    <div className="team-info">
                      <div className="team-name">{m.name}</div>
                      <div className="team-meta"><span className={"team-status "+m.status}>{m.statusLabel}</span>· {m.meta}</div>
                    </div>
                    {m.action && <button className="team-action">{m.action}</button>}
                  </div>
                ))}
                <button className="team-cta-primary">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"/></svg>
                  Invite another teammate
                </button>
              </>
            ) : (
              <div className="team-empty">
                <div style={{fontSize:13,color:"var(--secondary-text)",lineHeight:1.55,margin:"16px 0 14px",padding:"0 4px"}}>
                  Add a teammate to jump in faster on hot leads and expand your AI's contact reach.
                </div>
                <button className="team-cta-primary" style={{marginTop:0}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"/></svg>
                  Invite your first teammate
                </button>
              </div>
            )}
          </div>
        </div>

        {/* CHANNELS */}
        <div className="section" ref={refs.channels}>
          <div className="section-title">Channels</div>
          <div className="card" style={{padding:"2px 16px 12px"}}>
            {p.channels.map((c,i)=>(
              <div className={"ch-row"+(c.state==="orange"?" orange":"")+(c.coming?" coming":"")} key={i}>
                <div className="ch-icon"><ChIcon type={c.icon}/></div>
                <div className="ch-info">
                  <div className="ch-name">{c.name}</div>
                  <div className="ch-body" dangerouslySetInnerHTML={{__html:c.body}}></div>
                </div>
                <div className={"ch-dot "+c.state}></div>
              </div>
            ))}
          </div>
        </div>

        {/* RECENT AI DELIGHT */}
        {p.delightCalls && p.delightCalls.length>0 && (
          <div className="section" ref={refs.delight}>
            <div className="section-title">Recent AI delight <span className="more">See all</span></div>
            {p.delightCalls.map((c,i)=>(
              <div className="call-row" key={i}>
                <div className="avatar" style={{background:c.color}}>{c.avatar}</div>
                <div className="call-info">
                  <div className="call-name">{c.name} <span className="delight-badge">✨ Delight</span></div>
                  <div className="call-meta">{c.date}</div>
                  <div className="call-summary">{c.summary}</div>
                </div>
                <div className="call-play"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
              </div>
            ))}
          </div>
        )}

        {/* RECENT QUALIFIED LEADS */}
        {p.leads && p.leads.length>0 && (
          <div className="section" ref={refs.leads}>
            <div className="section-title">Recent qualified leads <span className="more">See all</span></div>
            {p.leads.map((l,i)=>(
              <div className="call-row" key={i}>
                <div className="avatar" style={{background:l.color}}>{l.avatar}</div>
                <div className="call-info">
                  <div className="call-name">{l.name} <span className="lead-badge">Lead</span></div>
                  <div className="call-meta">{l.date}</div>
                  <div className="call-summary">{l.summary}</div>
                </div>
                <div className="call-value">{l.value}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      <TabBar/>
    </div>
  );
};

/* KPI sub-component */
const KPICard = ({kpi, label, icon, onTap}) => (
  <div className={"kpi-card "+(kpi.state==="orange"?"orange":"")} onClick={onTap}>
    <div className="kpi-top">
      <div className="kpi-icon">{icon}</div>
      <div className="kpi-dot"></div>
    </div>
    <div className="kpi-label">{label}</div>
    <div className="kpi-num">{kpi.value}</div>
    <div className="kpi-sub">{kpi.sub}</div>
  </div>
);

/* Highlight card sub-component */
const HighlightCard = ({type, call, onTap}) => (
  <div className="hl-card" onClick={onTap}>
    <div className="hl-head">
      <div className="hl-eye">
        {type==="delight" ? "✨ AI DELIGHT" : "★ HIGH-$ LEAD"}
      </div>
      <div className="hl-meta">{call.duration}{call.value?" · "+call.value:""}</div>
    </div>
    <div className="hl-name">{call.name}</div>
    <div className="hl-sum">{call.summary}</div>
    <div className="hl-foot">
      <div className="hl-play">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <Waveform pattern={type==="delight"?WAVE_DELIGHT:WAVE_LEAD} played={type==="delight"?0.3:0.22}/>
    </div>
  </div>
);

/* ============================================================
 *  APP SHELL — persona tabs only
 * ============================================================ */
function App(){
  const [persona,setPersona] = useState("mature_accelerating");
  return (
    <>
      <div className="nav-row">
        {Object.entries(PERSONAS).map(([id,p])=>(
          <button key={id} className={persona===id?"active":""} onClick={()=>setPersona(id)}>{p.label}</button>
        ))}
      </div>
      <div className="phone"><StatsScreen persona={persona}/></div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
