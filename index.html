<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>YouSquared — Stats (iOS Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --accent:#FF8370;
  --accent-dark:#E07A5F;
  --accent-surface:#FF8370;
  --primary-text:#2D2A26;
  --secondary-text:#6B6560;
  --tertiary-text:#9E9893;
  --bg:#FFFFFF;
  --bg-warm:#F5F2EF;
  --surface-light:#FBF9F7;
  --surface-dark:#F8F6F4;
  --surface-darken:#F0EDEA;
  --surface-black:#2D2A26;
  --border:#E8E4E0;
  --input-bg:#F5F2EF;
  --input-stroke:#D8D4D0;
  --error:#E53935;
  --success:#43A047;
  --warning:#F57C00;
  --info:#42A5F5;
  --gold:#FFB300;
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{margin:0;padding:0;background:#1a1a1a;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#eee;min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}
.serif{font-family:'Lora',Georgia,serif}

/* Screen navigator */
.nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;justify-content:center;max-width:880px}
.nav button{font:inherit;font-size:13px;font-weight:500;padding:9px 16px;border-radius:30px;border:1px solid #333;background:#222;color:#ccc;cursor:pointer;transition:all .2s}
.nav button:hover{border-color:var(--accent);color:#fff}
.nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.label{font-size:12px;color:#888;margin-bottom:14px;text-align:center;max-width:560px;line-height:1.5}

/* Phone frame */
.phone{
  width:393px;height:852px;
  background:var(--bg);
  border-radius:44px;
  border:10px solid #0a0a0a;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 10px 30px rgba(0,0,0,.4);
  position:relative;overflow:hidden;
  color:var(--primary-text);
}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:15px;font-weight:600;color:var(--primary-text);position:relative;z-index:5}
.statusbar .notch{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:120px;height:34px;background:#0a0a0a;border-radius:20px}
.statusbar .icons{display:flex;gap:5px;align-items:center}
.statusbar .icons svg{display:block}

/* Screen container */
.screen{position:absolute;inset:0;display:flex;flex-direction:column}
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 130px}
.body::-webkit-scrollbar{width:0}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 14px}
.h-title{font-size:28px;font-weight:600;color:var(--primary-text);font-family:'Lora',serif}
.share-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 14px 7px 11px;border-radius:30px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;box-shadow:0 2px 8px rgba(255,131,112,.25)}
.share-pill svg{display:block}

/* Hero card — dark gradient like Safer Pharmacy hero */
.hero{
  margin:6px 16px 18px;
  background:linear-gradient(145deg,#2D2A26 0%,#433F3A 55%,#3A3632 100%);
  border-radius:22px;
  padding:22px 22px 20px;
  color:#fff;
  position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.35) 0%,rgba(255,131,112,0) 70%);top:-90px;right:-90px;pointer-events:none}
.hero::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.18) 0%,rgba(255,131,112,0) 70%);bottom:-70px;left:-50px;pointer-events:none}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#FFB7A6;position:relative}
.hero-num{font-family:'Lora',serif;font-size:48px;font-weight:600;line-height:1.05;margin:6px 0 4px;letter-spacing:-1px;position:relative}
.hero-sub{font-size:13px;color:#D8D2CB;position:relative;margin-bottom:14px}
.hero-trend{display:flex;align-items:center;gap:10px;position:relative;font-size:12px;color:#D8D2CB}
.hero-trend .delta{display:inline-flex;align-items:center;gap:4px;background:rgba(67,160,71,.18);color:#7BD789;padding:3px 9px;border-radius:30px;font-weight:600;font-size:11px}
.spark{position:relative;width:100%;height:42px;margin-top:14px}

/* Milestone progress */
.section{margin:0 16px 18px}
.section-title{font-size:13px;font-weight:600;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.8px;margin:6px 4px 10px;display:flex;justify-content:space-between;align-items:center}
.section-title .more{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:0;text-transform:none;cursor:pointer}

.card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:18px;padding:18px}
.card-tight{padding:14px 16px}

.milestone-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:8px}
.milestone-now{font-family:'Lora',serif;font-size:24px;font-weight:600;color:var(--primary-text)}
.milestone-target{font-size:12px;color:var(--secondary-text);font-weight:500}
.milestone-bar{height:10px;background:var(--surface-darken);border-radius:30px;overflow:hidden;position:relative}
.milestone-fill{height:100%;background:linear-gradient(90deg,#FFB7A6 0%,var(--accent) 100%);border-radius:30px;position:relative}
.milestone-fill::after{content:"";position:absolute;right:0;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(255,131,112,.25)}
.milestone-tiers{display:flex;justify-content:space-between;margin-top:14px;gap:6px}
.tier{flex:1;text-align:center;font-size:10px;color:var(--tertiary-text);font-weight:500}
.tier .dot{width:8px;height:8px;border-radius:50%;background:var(--surface-darken);margin:0 auto 4px}
.tier.passed .dot{background:var(--accent)}
.tier.passed{color:var(--secondary-text)}
.tier.next .dot{background:var(--accent);box-shadow:0 0 0 3px rgba(255,131,112,.2)}

/* Banner — milestone celebration */
.banner{margin:0 16px 16px;background:linear-gradient(135deg,#FFE8E0 0%,#FFD4C4 100%);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;border:0.5px solid #FFC2AE;position:relative}
.banner-emoji{font-size:24px}
.banner-body{flex:1}
.banner-title{font-size:14px;font-weight:700;color:var(--primary-text);line-height:1.25}
.banner-sub{font-size:12px;color:var(--secondary-text);margin-top:2px}
.banner-cta{font-size:12px;font-weight:600;color:#fff;background:var(--accent);padding:7px 12px;border-radius:30px;border:none;font-family:inherit;cursor:pointer;white-space:nowrap}

/* Funnel */
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.funnel-row:last-child{margin-bottom:0}
.funnel-label{font-size:12px;color:var(--secondary-text);width:108px;flex-shrink:0;font-weight:500}
.funnel-bar{flex:1;height:26px;background:var(--surface-darken);border-radius:8px;position:relative;overflow:hidden}
.funnel-fill{position:absolute;inset:0;background:linear-gradient(90deg,var(--accent-dark),var(--accent));border-radius:8px;display:flex;align-items:center;padding:0 10px;color:#fff;font-size:12px;font-weight:600}
.funnel-fill.muted{background:linear-gradient(90deg,#C8A095,#D8B4A8)}

/* KPI grid (3 supporting cards under hero) */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi-card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:16px;padding:14px 12px 13px}
.kpi-label{font-size:10px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.6px;font-weight:600;line-height:1.3;min-height:26px;margin-bottom:4px}
.kpi-num{font-family:'Lora',serif;font-size:24px;font-weight:600;color:var(--primary-text);line-height:1.05;margin-bottom:3px;letter-spacing:-.3px}
.kpi-sub{font-size:10px;color:var(--tertiary-text);font-weight:500}

/* Calls per cycle (matches SwiftUI BarMark from PR #144 UsageHistoryView) */
.cycle-grid{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px;padding:8px 0 0}
.cycle-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:6px;min-width:0}
.cycle-val{font-size:11px;color:var(--secondary-text);font-weight:600}
.cycle-bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--accent),var(--accent-dark));border-radius:4px 4px 2px 2px;min-height:6px}
.cycle-bar.past{background:linear-gradient(180deg,rgba(255,131,112,.45),rgba(224,122,95,.5))}
.cycle-label{font-size:9px;color:var(--tertiary-text);font-weight:500;text-align:center;line-height:1.2;white-space:nowrap}

/* Satisfaction distribution (4-segment stacked bar + legend) */
.sat-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;gap:2px;margin-bottom:14px;background:var(--surface-darken)}
.sat-seg{height:100%}
.sat-seg:first-child{border-radius:6px 0 0 6px}
.sat-seg:last-child{border-radius:0 6px 6px 0}
.sat-legend{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px}
.sat-item{display:flex;align-items:center;gap:8px;font-size:12px}
.sat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sat-name{flex:1;color:var(--secondary-text)}
.sat-val{font-weight:600;color:var(--primary-text);font-variant-numeric:tabular-nums}

/* Lifetime totals */
.lt-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:0.5px solid var(--border)}
.lt-row:last-child{border-bottom:none;padding-bottom:4px}
.lt-row:first-child{padding-top:2px}
.lt-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lt-label{flex:1;font-size:14px;color:var(--primary-text);font-weight:500}
.lt-val{font-family:'Lora',serif;font-size:19px;font-weight:600;color:var(--primary-text);letter-spacing:-.2px}

/* Monthly trend — show value labels above bars */
.trend-val-label{font-size:10px;color:var(--secondary-text);font-weight:600;font-variant-numeric:tabular-nums}

/* Lead list */
.lead-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0}
.lead-info{flex:1;min-width:0}
.lead-name{font-size:14px;font-weight:600;color:var(--primary-text);display:flex;align-items:center;gap:6px}
.lead-sub{font-size:12px;color:var(--secondary-text);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-value{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--accent-dark);flex-shrink:0}
.lead-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* Captured/Missed donut */
.split{display:flex;gap:12px;align-items:center}
.donut{position:relative;width:96px;height:96px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);line-height:1}
.donut-label{font-size:9px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.split-stats{flex:1;display:flex;flex-direction:column;gap:8px}
.split-stat{display:flex;align-items:center;gap:8px;font-size:12px}
.split-dot{width:10px;height:10px;border-radius:3px}
.split-stat .v{margin-left:auto;font-weight:600;color:var(--primary-text);font-family:'Lora',serif;font-size:14px}

/* Monthly trend */
.trend-grid{display:flex;align-items:flex-end;justify-content:space-between;height:150px;gap:8px;padding:6px 0 0}
.trend-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:6px;min-width:0}
.trend-bar{width:100%;max-width:38px;background:linear-gradient(180deg,var(--accent),var(--accent-dark));border-radius:6px 6px 2px 2px;min-height:4px}
.trend-bar.dim{background:var(--surface-darken);border:0.5px solid var(--border)}
.trend-month{font-size:10px;color:var(--secondary-text);font-weight:500}

/* Floating tab bar */
.tabbar-wrap{position:absolute;left:0;right:0;bottom:14px;display:flex;justify-content:center;align-items:center;padding:0 16px;gap:14px;z-index:10}
.tabbar{display:flex;align-items:center;height:56px;background:var(--surface-darken);border-radius:30px;padding:0 4px;flex:1;max-width:268px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.tab{flex:0 0 auto;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:30px;color:var(--primary-text)}
.tab.selected{background:var(--surface-black);color:#fff;padding:0 16px 0 14px;width:auto;gap:8px;height:48px}
.tab.selected .tab-label{font-size:14px;font-weight:600}
.tab svg{display:block}
.assistant{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FFB7A6,#FF8370 60%,#E07A5F);box-shadow:0 6px 20px rgba(255,131,112,.4);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'Lora',serif;font-size:22px;flex-shrink:0}

/* Inbox screen */
.inbox-row{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border-bottom:0.5px solid var(--border)}
.inbox-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-weight:600;font-size:13px}
.inbox-body{flex:1;min-width:0}
.inbox-title-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.inbox-name{font-size:15px;font-weight:600;color:var(--primary-text)}
.inbox-date{font-size:12px;color:var(--tertiary-text);margin-left:auto;flex-shrink:0;font-weight:500}
.inbox-preview{font-size:13px;color:var(--secondary-text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.todo-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;background:rgba(255,131,112,.15);color:var(--accent-dark);font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.lead-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;box-shadow:0 1px 3px rgba(255,131,112,.4)}

/* Push notif preview */
.push{
  margin:14px 16px 16px;
  background:rgba(245,242,239,.92);
  backdrop-filter:blur(10px);
  border-radius:18px;
  padding:12px 14px;
  display:flex;align-items:flex-start;gap:11px;
  border:0.5px solid rgba(0,0,0,.06);
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}
.push-icon{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#FFB7A6,#FF8370);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:'Lora',serif;flex-shrink:0}
.push-body{flex:1;min-width:0}
.push-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.push-app{font-size:12px;font-weight:700;color:var(--primary-text)}
.push-time{font-size:11px;color:var(--tertiary-text)}
.push-headline{font-size:13px;font-weight:600;color:var(--primary-text);margin:1px 0 1px;display:flex;align-items:center;gap:6px}
.push-text{font-size:13px;color:var(--secondary-text);line-height:1.3}

/* Share sheet */
.share-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;flex-direction:column;justify-content:flex-end;z-index:20}
.share-sheet{background:var(--bg);border-radius:28px 28px 0 0;padding:14px 0 36px;animation:slideUp .35s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:5px;background:#D8D4D0;border-radius:30px;margin:0 auto 12px}
.share-header{padding:6px 22px 14px;display:flex;align-items:center;justify-content:space-between}
.share-h-title{font-size:18px;font-weight:700;color:var(--primary-text)}
.share-h-sub{font-size:12px;color:var(--secondary-text);margin-top:2px}
.share-close{width:32px;height:32px;border-radius:50%;background:var(--surface-darken);display:flex;align-items:center;justify-content:center;color:var(--secondary-text);font-size:16px;font-weight:600;cursor:pointer;border:none}
.share-section-h{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--secondary-text);padding:8px 22px 6px}
.boss-row{display:flex;align-items:center;gap:12px;padding:12px 22px;cursor:pointer}
.boss-row:hover{background:var(--surface-dark)}
.boss-info{flex:1}
.boss-name{font-size:15px;font-weight:600;color:var(--primary-text)}
.boss-role{font-size:12px;color:var(--secondary-text);margin-top:1px}
.boss-cta{font-size:12px;font-weight:600;color:var(--accent);padding:7px 14px;border-radius:30px;background:rgba(255,131,112,.12);border:none}
.preview-card{margin:14px 22px 0;padding:14px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px}
.preview-msg{font-size:13px;color:var(--primary-text);line-height:1.45;margin-bottom:10px}
.preview-img{height:88px;background:linear-gradient(135deg,#2D2A26,#433F3A);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#FFB7A6;font-family:'Lora',serif;font-size:18px;font-weight:600;position:relative;overflow:hidden}
.preview-img::before{content:"";position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.25),transparent 70%);top:-60px;right:-40px}

/* Milestone celebration screen */
.celebrate{position:absolute;inset:0;background:linear-gradient(180deg,#2D2A26 0%,#3A3632 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;color:#fff;text-align:center;overflow:hidden}
.celebrate::before{content:"";position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.25),transparent 60%);top:-100px;left:-100px}
.celebrate::after{content:"";position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.18),transparent 60%);bottom:-50px;right:-100px}
.confetti{position:absolute;width:10px;height:14px;animation:fall 3s linear infinite}
@keyframes fall{
  0%{transform:translateY(-100px) rotate(0)}
  100%{transform:translateY(900px) rotate(540deg)}
}
.celebrate-emoji{font-size:64px;margin-bottom:14px;position:relative;animation:pop .8s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.celebrate-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#FFB7A6;position:relative}
.celebrate-num{font-family:'Lora',serif;font-size:62px;font-weight:600;letter-spacing:-1.5px;line-height:1;margin:8px 0 12px;position:relative}
.celebrate-h{font-size:18px;font-weight:600;line-height:1.35;position:relative;margin-bottom:8px}
.celebrate-sub{font-size:14px;color:#D8D2CB;line-height:1.5;position:relative;margin-bottom:32px;max-width:280px}
.celebrate-cta{padding:14px 28px;background:var(--accent);color:#fff;border:none;border-radius:30px;font-size:16px;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:8px;cursor:pointer;position:relative;box-shadow:0 8px 24px rgba(255,131,112,.35)}
.celebrate-secondary{margin-top:14px;font-size:13px;color:#D8D2CB;background:none;border:none;font-family:inherit;cursor:pointer;position:relative}

</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const {useState,useEffect} = React;

const COLORS = {accent:"#FF8370",accentDark:"#E07A5F",primary:"#2D2A26",secondary:"#6B6560"};

// ---------- Status bar ----------
const StatusBar = () => (
  <div className="statusbar">
    <span>9:41</span>

// ---------- Sparkline ----------
const Spark = () => {
  const pts = [10,18,14,22,28,24,32,38,30,42,48,52];
  const max = 60, min = 0;
  const w = 320, h = 42;
  const sx = i => (i/(pts.length-1))*w;
  const sy = v => h - ((v-min)/(max-min))*h;
  const path = pts.map((p,i)=>`${i===0?"M":"L"}${sx(i)},${sy(p)}`).join(" ");
  const area = path + ` L${w},${h} L0,${h} Z`;
  return (
    <svg className="spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="sg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor="#FF8370" stopOpacity=".5"/>
          <stop offset="1" stopColor="#FF8370" stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#sg)"/>
      <path d={path} fill="none" stroke="#FFB7A6" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
};

// ---------- Donut ----------
const Donut = ({captured=84}) => {
  const r = 38, c = 2*Math.PI*r;
  const dash = (captured/100)*c;
  return (
    <div className="donut">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="48" cy="48" r={r} fill="none" stroke="#F0EDEA" strokeWidth="10"/>
        <circle cx="48" cy="48" r={r} fill="none" stroke="url(#dg)" strokeWidth="10" strokeDasharray={`${dash} ${c}`} strokeLinecap="round" transform="rotate(-90 48 48)"/>
        <defs>
          <linearGradient id="dg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stopColor="#FF8370"/>
            <stop offset="1" stopColor="#E07A5F"/>
          </linearGradient>
        </defs>
      </svg>
      <div className="donut-center">
        <div className="donut-pct">{captured}%</div>
        <div className="donut-label">Captured</div>
      </div>
    </div>
  );
};

// ---------- App shell ----------
const SCREENS = [
  {id:"analytics",label:"Stats tab"},
  {id:"analytics-banner",label:"Stats + milestone banner"},
  {id:"inbox",label:"Inbox (with Lead badge)"},
  {id:"celebrate",label:"Milestone celebration"},
  {id:"share",label:"Share with boss"},
  {id:"push",label:"Push notif preview"},
];

function App(){
  const [screen,setScreen] = useState("analytics");
  const render = () => {
    switch(screen){
      case "analytics": return <AnalyticsScreen onShare={()=>setScreen("share")} showBanner={false}/>;
      case "analytics-banner": return <AnalyticsScreen onShare={()=>setScreen("share")} showBanner={true}/>;
      case "inbox": return <InboxScreen/>;
      case "celebrate": return <CelebrateScreen/>;
      case "share": return <ShareScreen onClose={()=>setScreen("analytics")}/>;
      case "push": return <PushScreen/>;
      default: return null;
    }
  };
  return (
    <>
      <div className="nav">
        {SCREENS.map(s => (
          <button key={s.id} className={screen===s.id?"active":""} onClick={()=>setScreen(s.id)}>{s.label}</button>
        ))}
      </div>
      <div className="label">YouSquared iOS — Stats tab mockup · Safer Pharmacy sample data · 393×852 phone frame</div>
      <div className="phone">{render()}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
